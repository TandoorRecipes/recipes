name: Vue Continuous Integration

# Runs Vitest unit/integration tests + a dev-server healthcheck for the vue3/
# frontend. Lives here — the branch that introduced the Vitest infrastructure
# — so every chain branch and every dependabot PR inherits it on rebase.
# The preview orchestrator invokes this via workflow_call alongside ci.yml
# before publishing the Docker image.

on:
  push:
    branches-ignore: [preview]
  pull_request:
  workflow_call:

jobs:
  vue-tests:
    runs-on: ubuntu-latest
    # Node 22 (oldest LTS we support) and Node 24 (prod). Node 25 was here
    # for forward coverage but currently fails on a jsdom / localStorage
    # polyfill mismatch (`storage.getItem is not a function`). Even with
    # continue-on-error, the failing matrix entry shows up as a failed
    # status check that blocks GitHub's native auto-merge on dependabot
    # PRs (auto-merge refuses to fire while any check is failing, even
    # informational ones). Drop Node 25 until the jsdom incompat is fixed.
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"
          cache-dependency-path: ./vue3/yarn.lock

      - name: Install Vue dependencies
        working-directory: ./vue3
        run: yarn install

      - name: Run Vue tests
        working-directory: ./vue3
        run: yarn test

      - name: Dev server health check
        working-directory: ./vue3
        run: yarn healthcheck
