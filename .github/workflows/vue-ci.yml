name: Vue Continuous Integration

# Runs Vitest unit/integration tests + a dev-server healthcheck for the vue3/
# frontend. Lives here — the branch that introduced the Vitest infrastructure
# — so every chain branch and every dependabot PR inherits it on rebase.
# The preview orchestrator invokes this via workflow_call alongside ci.yml
# before publishing the Docker image.

on:
  push:
    branches-ignore: [preview]
  pull_request:
  workflow_call:

jobs:
  vue-tests:
    runs-on: ubuntu-latest
    # Node 25 is bleeding-edge (not LTS) and currently fails on a jsdom /
    # localStorage polyfill mismatch (`storage.getItem is not a function`).
    # Run it for forward coverage but don't fail the workflow on it.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ["24", "25"]
        include:
          - node-version: "25"
            experimental: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"
          cache-dependency-path: ./vue3/yarn.lock

      - name: Install Vue dependencies
        working-directory: ./vue3
        run: yarn install

      - name: Run Vue tests
        working-directory: ./vue3
        run: yarn test

      - name: Dev server health check
        working-directory: ./vue3
        run: yarn healthcheck
